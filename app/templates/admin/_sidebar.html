<!-- Admin Sidebar Partial — included by all admin pages -->
<div id="admin-sidebar">
  <div class="sidebar-header">
    <a class="sidebar-logo" href="{{ url_for('courses.index') }}">Rate<span>My</span>Class</a>
    <div class="sidebar-badge">Admin</div>
  </div>

  <div class="sidebar-user">
    <div class="sidebar-user-name">{{ current_user.first_name }} {{ current_user.last_name }}</div>
    <div class="sidebar-user-email">{{ current_user.email }}</div>
  </div>

  <nav class="sidebar-nav">
    <a href="{{ url_for('admin.dashboard') }}" class="sidebar-item {% if active_page == 'dashboard' %}active{% endif %}">
      <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
      Dashboard
    </a>
    <a href="{{ url_for('admin.user_list') }}" class="sidebar-item {% if active_page == 'users' %}active{% endif %}">
      <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      User Management
    </a>
    <a href="{{ url_for('admin.moderation') }}" class="sidebar-item {% if active_page == 'moderation' %}active{% endif %}">
      <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
      Moderation Queue
      {% if pending_count is defined and pending_count > 0 %}
        <span class="sidebar-badge-count">{{ pending_count }}</span>
      {% endif %}
    </a>
  </nav>

  <div class="sidebar-bottom">
    <a href="{{ url_for('courses.index') }}" class="sidebar-item">
      <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></span>
      Back to Site
    </a>
    <a href="{{ url_for('auth.logout') }}" class="sidebar-item sidebar-item-logout">
      <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      Sign Out
    </a>
  </div>
</div>
